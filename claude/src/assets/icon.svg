<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Cadence — app icon
    Concept: a stylized clock/dial whose tick marks form a cadence; the
    sweeping arc represents flow of time; the central dot is "now".
    Designed to read at any size from 16px to 1024px.
  -->
  <defs>
    <!-- Squircle background gradient: deep indigo → violet -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B6CFF"/>
      <stop offset="1" stop-color="#7B3FE4"/>
    </linearGradient>
    <!-- Inner glow gradient -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent gradient for the sweeping arc -->
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE7A8"/>
      <stop offset="1" stop-color="#FFB347"/>
    </linearGradient>
    <!-- Soft drop-shadow for foreground elements -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1A1149" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Squircle (Apple-style, ~22.37% corner radius) -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#glow)"/>

  <!-- Subtle outer ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>

  <!-- 12 cadence ticks around the dial -->
  <g stroke="#FFFFFF" stroke-linecap="round" stroke-opacity="0.55">
    <!-- 12 o'clock -->
    <line x1="512" y1="186" x2="512" y2="222" stroke-width="14"/>
    <!-- 3 o'clock -->
    <line x1="838" y1="512" x2="802" y2="512" stroke-width="14"/>
    <!-- 6 o'clock -->
    <line x1="512" y1="838" x2="512" y2="802" stroke-width="14"/>
    <!-- 9 o'clock -->
    <line x1="186" y1="512" x2="222" y2="512" stroke-width="14"/>
  </g>
  <g stroke="#FFFFFF" stroke-linecap="round" stroke-opacity="0.32">
    <!-- minor ticks at 1, 2, 4, 5, 7, 8, 10, 11 -->
    <line x1="675" y1="214.7" x2="666.5" y2="240" stroke-width="9"/>
    <line x1="809.3" y1="349" x2="784" y2="357.5" stroke-width="9"/>
    <line x1="809.3" y1="675" x2="784" y2="666.5" stroke-width="9"/>
    <line x1="675" y1="809.3" x2="666.5" y2="784" stroke-width="9"/>
    <line x1="349" y1="809.3" x2="357.5" y2="784" stroke-width="9"/>
    <line x1="214.7" y1="675" x2="240" y2="666.5" stroke-width="9"/>
    <line x1="214.7" y1="349" x2="240" y2="357.5" stroke-width="9"/>
    <line x1="349" y1="214.7" x2="357.5" y2="240" stroke-width="9"/>
  </g>

  <!-- Sweeping arc (the "cadence") — from 12 o'clock around to ~4 o'clock -->
  <g filter="url(#softShadow)">
    <!--
      Arc from (512, 232) sweeping clockwise to roughly (752, 632).
      Radius 280, large-arc=0, sweep=1
    -->
    <path d="M 512 232 A 280 280 0 0 1 752 632"
          fill="none"
          stroke="url(#arcGrad)"
          stroke-width="56"
          stroke-linecap="round"/>
  </g>

  <!-- Central "now" dot -->
  <circle cx="512" cy="512" r="44" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="22" fill="#5B6CFF"/>

  <!-- Tip cap at the start of the arc (small accent dot) -->
  <circle cx="512" cy="232" r="14" fill="#FFFFFF" fill-opacity="0.95"/>
</svg>
